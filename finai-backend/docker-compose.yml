version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: finai_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - /mnt/dados/finai/postgres_data_v2:/var/lib/postgresql/data
    networks:
      - finai_network

networks:
  finai_network:
    driver: bridge